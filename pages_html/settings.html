<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" sizes="60x60" href="/favicon.png">
    <script type="module" src="/src/settings.ts"></script>
    <title>Settings</title>
</head>

<body class="bg-settings page-wrapper">

    <main class="settings-container">

        <h1 class="settings-container__title">
            <img src="/assets/img/settings/Headline.svg" class="settings-container__logo" alt="Einstellungen">
        </h1>

        <section class="settings-panel-content" aria-label="Benutzereinstellungen">

            <nav class="settings-panel__nav" aria-label="Hauptnavigation">
                <section class="btn-container">
                    <h2><img src="/assets/img/settings/palette.svg" alt="Game Themes Image">Games themes</h2>
                    <div class="btn-input-box">
                        <input id="theme-1" type="radio" name="theme-selection" class="circle-checkbox">
                        <label for="theme-1" class="theme-label">
                            <span class="circle-display"></span>
                            <span class="label-text">Theme 1</span>
                            <img src="../assets/img/settings/mini-line.svg" class="arrow-icon" alt="Mini Line">
                        </label>
                    </div>

                    <div class="btn-input-box">
                        <input id="theme-2" type="radio" name="theme-selection" class="circle-checkbox">
                        <label for="theme-2" class="theme-label">
                            <span class="circle-display"></span>
                            <span class="label-text">Theme 2</span>
                            <img src="../assets/img/settings/mini-line.svg" class="arrow-icon" alt="Mini Line">
                        </label>
                    </div>

                    <div class="btn-input-box">
                        <input id="theme-3" type="radio" name="theme-selection" class="circle-checkbox">
                        <label for="theme-3" class="theme-label">
                            <span class="circle-display"></span>
                            <span class="label-text">Theme 3</span>
                            <img src="../assets/img/settings/mini-line.svg" class="arrow-icon" alt="Mini Line">
                        </label>
                    </div>

                    <div class="btn-input-box">
                        <input id="theme-4" type="radio" name="theme-selection" class="circle-checkbox">
                        <label for="theme-4" class="theme-label">
                            <span class="circle-display"></span>
                            <span class="label-text">Theme 4</span>
                            <img src="../assets/img/settings/mini-line.svg" class="arrow-icon" alt="Mini Line">
                        </label>
                    </div>

                    <h3><img src="/assets/img/settings/chess.svg" alt="Player Image">Choose player</h3>
                    <div class="btn-input-box">
                        <input id="theme-3" type="radio" name="theme-selection" class="circle-checkbox">
                        <label for="theme-3" class="theme-label">
                            <span class="circle-display"></span>
                            <span class="label-text">Blue</span>
                            <img src="../assets/img/settings/mini-line.svg" class="arrow-icon" alt="Mini Line">
                        </label>
                    </div>

                    <div class="btn-input-box">
                        <input id="theme-4" type="radio" name="theme-selection" class="circle-checkbox">
                        <label for="theme-4" class="theme-label">
                            <span class="circle-display"></span>
                            <span class="label-text">Orange</span>
                            <img src="../assets/img/settings/mini-line.svg" class="arrow-icon" alt="Mini Line">
                        </label>
                    </div>
                    <h4><img src="/assets/img/settings/board-size.svg" alt="Bord Size Image">Bord size</h4>
                    <div class="btn-input-box">
                        <input id="theme-3" type="radio" name="theme-selection" class="circle-checkbox">
                        <label for="theme-3" class="theme-label">
                            <span class="circle-display"></span>
                            <span class="label-text">16 Card</span>
                            <img src="../assets/img/settings/mini-line.svg" class="arrow-icon" alt="Mini Line">
                        </label>
                    </div>

                    <div class="btn-input-box">
                        <input id="theme-4" type="radio" name="theme-selection" class="circle-checkbox">
                        <label for="theme-4" class="theme-label">
                            <span class="circle-display"></span>
                            <span class="label-text">24 card</span>
                            <img src="../assets/img/settings/mini-line.svg" class="arrow-icon" alt="Mini Line">
                        </label>
                    </div>

                      <div class="btn-input-box">
                        <input id="theme-4" type="radio" name="theme-selection" class="circle-checkbox">
                        <label for="theme-4" class="theme-label">
                            <span class="circle-display"></span>
                            <span class="label-text">36 Card</span>
                            <img src="../assets/img/settings/mini-line.svg" class="arrow-icon" alt="Mini Line">
                        </label>
                    </div>

                </section>

            </nav>

            <div class="settings-panel__display">

                 <img src="/assets/img/settings/preview.png" alt="Vorschau" class="settings-panel__image">

                <nav class="settings-panel__sub-nav" aria-label="Unternavigation">
                    <ul class="settings-panel__list" role="list">
                        <li class="settings-panel__item">
                            <button type="button" class="settings-panel__button">Sub-Option</button>
                        </li>
                    </ul>
                </nav>

               

            </div>

        </section>

    </main>

</body>

</html>
