<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" sizes="60x60" href="/favicon.png">
    <script type="module" src="/src/settings.ts"></script>
    <title>Settings</title>
</head>

<body class="bg-settings page-wrapper">

    <main class="settings-container">

        <h1 class="settings-container__title">
            <img src="/assets/img/settings/Headline.svg" class="settings-container__logo" alt="Einstellungen">
        </h1>

        <section class="settings-panel" aria-label="Benutzereinstellungen">

            <nav class="settings-panel__nav" aria-label="Hauptnavigation">
                <section class="nav-options">

                    <h2 class="nav-options__section-title">
                        <img src="/assets/img/settings/palette.svg" alt="" aria-hidden="true">
                        Games themes
                    </h2>

                    <div class="nav-options__option">
                        <input id="theme-1" type="radio" name="theme-selection" class="nav-options__radio">
                        <label for="theme-1" class="nav-options__label">
                            <span class="nav-options__indicator" aria-hidden="true"></span>
                            <span class="nav-options__label-text">Theme 1</span>
                            <img src="/assets/img/settings/mini-line.svg" class="nav-options__arrow" alt=""
                                aria-hidden="true">
                        </label>
                    </div>

                    <div class="nav-options__option">
                        <input id="theme-2" type="radio" name="theme-selection" class="nav-options__radio">
                        <label for="theme-2" class="nav-options__label">
                            <span class="nav-options__indicator" aria-hidden="true"></span>
                            <span class="nav-options__label-text">Theme 2</span>
                            <img src="/assets/img/settings/mini-line.svg" class="nav-options__arrow" alt=""
                                aria-hidden="true">
                        </label>
                    </div>

                    <div class="nav-options__option">
                        <input id="theme-3" type="radio" name="theme-selection" class="nav-options__radio">
                        <label for="theme-3" class="nav-options__label">
                            <span class="nav-options__indicator" aria-hidden="true"></span>
                            <span class="nav-options__label-text">Theme 3</span>
                            <img src="/assets/img/settings/mini-line.svg" class="nav-options__arrow" alt=""
                                aria-hidden="true">
                        </label>
                    </div>

                    <div class="nav-options__option">
                        <input id="theme-4" type="radio" name="theme-selection" class="nav-options__radio">
                        <label for="theme-4" class="nav-options__label">
                            <span class="nav-options__indicator" aria-hidden="true"></span>
                            <span class="nav-options__label-text">Theme 4</span>
                            <img src="/assets/img/settings/mini-line.svg" class="nav-options__arrow" alt=""
                                aria-hidden="true">
                        </label>
                    </div>

                    <h2 class="nav-options__section-title">
                        <img src="/assets/img/settings/chess.svg" alt="" aria-hidden="true">
                        Choose player
                    </h2>

                    <div class="nav-options__option">
                        <input id="player-blue" type="radio" name="player-selection" class="nav-options__radio">
                        <label for="player-blue" class="nav-options__label">
                            <span class="nav-options__indicator" aria-hidden="true"></span>
                            <span class="nav-options__label-text">Blue</span>
                            <img src="/assets/img/settings/mini-line.svg" class="nav-options__arrow" alt=""
                                aria-hidden="true">
                        </label>
                    </div>

                    <div class="nav-options__option">
                        <input id="player-orange" type="radio" name="player-selection" class="nav-options__radio">
                        <label for="player-orange" class="nav-options__label">
                            <span class="nav-options__indicator" aria-hidden="true"></span>
                            <span class="nav-options__label-text">Orange</span>
                            <img src="/assets/img/settings/mini-line.svg" class="nav-options__arrow" alt=""
                                aria-hidden="true">
                        </label>
                    </div>

                    <h2 class="nav-options__section-title">
                        <img src="/assets/img/settings/board-size.svg" alt="" aria-hidden="true">
                        Board size
                    </h2>

                    <div class="nav-options__option">
                        <input id="size-16" type="radio" name="size-selection" class="nav-options__radio">
                        <label for="size-16" class="nav-options__label">
                            <span class="nav-options__indicator" aria-hidden="true"></span>
                            <span class="nav-options__label-text">16 Cards</span>
                            <img src="/assets/img/settings/mini-line.svg" class="nav-options__arrow" alt=""
                                aria-hidden="true">
                        </label>
                    </div>

                    <div class="nav-options__option">
                        <input id="size-24" type="radio" name="size-selection" class="nav-options__radio">
                        <label for="size-24" class="nav-options__label">
                            <span class="nav-options__indicator" aria-hidden="true"></span>
                            <span class="nav-options__label-text">24 Cards</span>
                            <img src="/assets/img/settings/mini-line.svg" class="nav-options__arrow" alt=""
                                aria-hidden="true">
                        </label>
                    </div>

                    <div class="nav-options__option">
                        <input id="size-36" type="radio" name="size-selection" class="nav-options__radio">
                        <label for="size-36" class="nav-options__label">
                            <span class="nav-options__indicator" aria-hidden="true"></span>
                            <span class="nav-options__label-text">36 Cards</span>
                            <img src="/assets/img/settings/mini-line.svg" class="nav-options__arrow" alt=""
                                aria-hidden="true">
                        </label>
                    </div>

                </section>
            </nav>

            <div class="settings-panel__display">
                <div class="theme-preview">
                    <img src="/assets/img/settings/preview.png" alt="Ausgewähltes Theme Bild"
                        class="theme-preview__image">

                    <nav class="theme-preview__sub-nav" aria-label="Unternavigation">
                        <ul class="theme-preview__sub-list" role="list">
                            <li class="theme-preview__sub-item">
                                <span>Game Theme</span>
                                <img src="/assets/img/settings/line-diagonal.svg" alt="" aria-hidden="true">
                                <span>Player</span>
                                <img src="/assets/img/settings/line-diagonal.svg" alt="" aria-hidden="true">
                                <span>Board size</span>
                            </li>
                        </ul>
                        <button class="play-link settings-btn">
                            <img src="/assets/img/settings/start-btn.svg" alt="Controller" class="play-link__icon">
                            <span class="play-link__text">Start</span>
                        </button>
                    </nav>
                </div>
            </div>

        </section>

    </main>

</body>

</html>
